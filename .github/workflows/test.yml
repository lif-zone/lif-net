name: BAT

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        uses: actions/setup-node@v4
        with:
          node-version: 26.1.0
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Lint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        uses: actions/setup-node@v4
        with:
          node-version: 26.1.0
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Test
        run: npm run test-ci
        timeout-minutes: 5
      - name: Publish Test Results (Mocha)
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: ./test/results.xml
          comment_mode: always

  test-browser:
    name: Test Browser
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26.1.0
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome
      - name: Install
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Browser Test
        run: npm run test-browser
        timeout-minutes: 5
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

  test-lif:
    name: Test LIF
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26.1.0
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome
      - name: Install
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Test LIF
        run: npm run test-lif
        timeout-minutes: 5
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
