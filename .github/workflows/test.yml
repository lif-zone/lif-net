name: BAT

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        uses: actions/setup-node@v4
        with:
          node-version: 26.1.0
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Lint
        run: npm run lint

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
        node: [26.1.0]
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Test
        run: npm run test

  browser-test:
    name: Browser Test
    runs-on: ubuntu-24.04
    if: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26.1.0
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome
      - name: Install
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Browser Test
        run: npm run test-browser
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
